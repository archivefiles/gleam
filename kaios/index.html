<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaiOS Video App</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 240px;
            height: 320px;
            background: #0f0f0f;
            font-family: 'Segoe UI', Arial, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        .header {
            background: #202020;
            padding: 8px 10px;
            border-bottom: 1px solid #303030;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .header h1 {
            font-size: 14px;
            color: #ff0000;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .header h1::before {
            content: "▶";
            font-size: 12px;
        }

        .video-grid {
            height: calc(320px - 37px);
            overflow-y: auto;
            overflow-x: hidden;
            padding: 6px;
        }

        .video-card {
            background: #1a1a1a;
            border-radius: 6px;
            margin-bottom: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 2px solid transparent;
            transition: border-color 0.1s;
        }

        .video-card:focus, .video-card.active {
            border-color: #ff0000;
            outline: none;
        }

        .thumbnail-container {
            position: relative;
            width: 100%;
            height: 100px;
            background: #000;
            overflow: hidden;
        }

        .thumbnail-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .play-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 36px;
            height: 36px;
            background: rgba(0,0,0,0.7);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            color: #fff;
        }

        .duration {
            position: absolute;
            bottom: 4px;
            right: 4px;
            background: rgba(0,0,0,0.8);
            color: #fff;
            font-size: 10px;
            padding: 1px 4px;
            border-radius: 2px;
        }

        .video-info {
            padding: 6px 8px;
        }

        .video-title {
            font-size: 11px;
            font-weight: 600;
            line-height: 1.3;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
            color: #f1f1f1;
            margin-bottom: 3px;
        }

        .video-meta {
            font-size: 9px;
            color: #aaa;
            display: flex;
            gap: 6px;
        }

        /* Video Player Overlay */
        .player-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 240px;
            height: 320px;
            background: #000;
            z-index: 100;
            flex-direction: column;
        }

        .player-overlay.active {
            display: flex;
        }

        .player-video {
            width: 100%;
            height: 180px;
            background: #000;
        }

        .player-video video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .player-info {
            padding: 8px 10px;
            flex: 1;
            overflow: hidden;
        }

        .player-title {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 4px;
            line-height: 1.3;
        }

        .player-meta {
            font-size: 10px;
            color: #aaa;
        }

        .player-controls {
            background: #202020;
            padding: 6px 10px;
            display: flex;
            align-items: center;
            gap: 8px;
            border-top: 1px solid #303030;
        }

        .control-btn {
            background: #ff0000;
            color: #fff;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            cursor: pointer;
            font-weight: 600;
        }

        .control-btn.secondary {
            background: #303030;
        }

        .progress-bar {
            flex: 1;
            height: 4px;
            background: #404040;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            height: 100%;
            background: #ff0000;
            width: 0%;
            transition: width 0.3s;
        }

        /* Scrollbar */
        .video-grid::-webkit-scrollbar {
            width: 3px;
        }
        .video-grid::-webkit-scrollbar-thumb {
            background: #444;
            border-radius: 2px;
        }

        /* Soft key hints */
        .softkeys {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 240px;
            height: 20px;
            background: #202020;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 8px;
            font-size: 10px;
            color: #aaa;
            border-top: 1px solid #303030;
            z-index: 50;
        }

        .softkey {
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .video-grid {
            height: calc(320px - 57px);
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="header">
        <h1>KaiTube</h1>
    </div>

    <div class="video-grid" id="videoGrid">
        <!-- Videos will be loaded here -->
    </div>

    <!-- Video Player Overlay -->
    <div class="player-overlay" id="playerOverlay">
        <div class="player-video">
            <video id="videoPlayer" controls preload="metadata"></video>
        </div>
        <div class="player-info">
            <div class="player-title" id="playerTitle">Video Title</div>
            <div class="player-meta" id="playerMeta">Channel Name • Views</div>
        </div>
        <div class="player-controls">
            <button class="control-btn secondary" id="backBtn">Back</button>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
        </div>
    </div>

    <div class="softkeys">
        <div class="softkey">◀ Back</div>
        <div class="softkey">OK Select</div>
        <div class="softkey">Menu ▶</div>
    </div>

    <script>
        // Sample video data - replace with your actual video files
        const videos = [
            {
                id: 1,
                title: "Big Buck Bunny - Open Movie",
                channel: "Blender Foundation",
                views: "12M views",
                duration: "9:56",
                thumbnail: "https://archivefiles.github.io/images1/10secmessege.jpg",
                videoSrc: "https://archivefiles.github.io/videos1/10secmessege.mp4"
            },
            {
                id: 2,
                title: "Elephants Dream - First Open Movie",
                channel: "Blender Foundation",
                views: "8.5M views",
                duration: "10:53",
                thumbnail: "https://archivefiles.github.io/images1/nature1.jpg",
                videoSrc: "https://archivefiles.github.io/videos1/nature1.mp4"
            },
            {
                id: 3,
                title: "Sintel - Fantasy Animation",
                channel: "Blender Foundation",
                views: "15M views",
                duration: "14:48",
                thumbnail: "https://archivefiles.github.io/images1/nature2.jpg",
                videoSrc: "https://archivefiles.github.io/videos1/nature2.mp4"
            },
            {
                id: 4,
                title: "Tears of Steel - Sci-Fi Short",
                channel: "Blender Foundation",
                views: "6.2M views",
                duration: "12:14",
                thumbnail: "https://archivefiles.github.io/images1/nature3.jpg",
                videoSrc: "https://archivefiles.github.io/videos1/nature3.mp4"
            },
            {
                id: 5,
                title: "For Bigger Blazes - Fire Demo",
                channel: "Google",
                views: "3.1M views",
                duration: "0:15",
                thumbnail: "https://archivefiles.github.io/images1/nature4.jpg",
                videoSrc: "https://archivefiles.github.io/videos1/nature4.mp4"
            }
        ];

        const videoGrid = document.getElementById('videoGrid');
        const playerOverlay = document.getElementById('playerOverlay');
        const videoPlayer = document.getElementById('videoPlayer');
        const playerTitle = document.getElementById('playerTitle');
        const playerMeta = document.getElementById('playerMeta');
        const backBtn = document.getElementById('backBtn');
        const progressFill = document.getElementById('progressFill');

        let currentFocusIndex = 0;
        let videoCards = [];

        // Render video cards
        function renderVideos() {
            videoGrid.innerHTML = '';
            videos.forEach((video, index) => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.setAttribute('tabindex', '0');
                card.setAttribute('data-index', index);
                card.innerHTML = `
                    <div class="thumbnail-container">
                        <img src="${video.thumbnail}" alt="${video.title}" loading="lazy">
                        <div class="play-overlay">▶</div>
                        <div class="duration">${video.duration}</div>
                    </div>
                    <div class="video-info">
                        <div class="video-title">${video.title}</div>
                        <div class="video-meta">${video.channel} • ${video.views}</div>
                    </div>
                `;

                card.addEventListener('click', () => playVideo(video));
                card.addEventListener('keydown', (e) => handleKeyNavigation(e, index));

                videoGrid.appendChild(card);
                videoCards.push(card);
            });

            // Focus first card
            if (videoCards.length > 0) {
                videoCards[0].focus();
                videoCards[0].classList.add('active');
            }
        }

        // Play video
        function playVideo(video) {
            playerTitle.textContent = video.title;
            playerMeta.textContent = `${video.channel} • ${video.views}`;
            videoPlayer.src = video.videoSrc;
            playerOverlay.classList.add('active');
            videoPlayer.play().catch(e => console.log('Auto-play prevented:', e));
            backBtn.focus();
        }

        // Close player
        function closePlayer() {
            videoPlayer.pause();
            videoPlayer.src = '';
            playerOverlay.classList.remove('active');
            if (videoCards[currentFocusIndex]) {
                videoCards[currentFocusIndex].focus();
            }
        }

        // Handle keyboard navigation (D-pad for KaiOS)
        function handleKeyNavigation(e, index) {
            const key = e.key;

            if (key === 'ArrowDown') {
                e.preventDefault();
                if (index < videoCards.length - 1) {
                    videoCards[index].classList.remove('active');
                    currentFocusIndex = index + 1;
                    videoCards[currentFocusIndex].focus();
                    videoCards[currentFocusIndex].classList.add('active');
                    videoCards[currentFocusIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            } else if (key === 'ArrowUp') {
                e.preventDefault();
                if (index > 0) {
                    videoCards[index].classList.remove('active');
                    currentFocusIndex = index - 1;
                    videoCards[currentFocusIndex].focus();
                    videoCards[currentFocusIndex].classList.add('active');
                    videoCards[currentFocusIndex].scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            } else if (key === 'Enter' || key === 'OK') {
                e.preventDefault();
                playVideo(videos[index]);
            }
        }

        // Back button handler
        backBtn.addEventListener('click', closePlayer);
        backBtn.addEventListener('keydown', (e) => {
            if (e.key === 'Enter' || e.key === 'Backspace' || e.key === 'Escape') {
                closePlayer();
            }
        });

        // Global key handler for back button
        document.addEventListener('keydown', (e) => {
            if ((e.key === 'Backspace' || e.key === 'Escape') && playerOverlay.classList.contains('active')) {
                e.preventDefault();
                closePlayer();
            }
        });

        // Update progress bar
        videoPlayer.addEventListener('timeupdate', () => {
            if (videoPlayer.duration) {
                const progress = (videoPlayer.currentTime / videoPlayer.duration) * 100;
                progressFill.style.width = progress + '%';
            }
        });

        // Initialize
        renderVideos();
    </script>
</body>
</html>
